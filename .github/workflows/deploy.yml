name: Deploy OTP-Bot-Telegram

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deployment secrets
        run: |
          echo "Checking deployment secrets..."
          test -n "${{ secrets.SERVER_HOST }}" || { echo "Missing SERVER_HOST"; exit 1; }
          test -n "${{ secrets.SERVER_USER }}" || { echo "Missing SERVER_USER"; exit 1; }
          test -n "${{ secrets.SERVER_SSH_KEY }}" || { echo "Missing SERVER_SSH_KEY"; exit 1; }
          test -n "${{ secrets.SERVER_SSH_PORT }}" || { echo "Missing SERVER_SSH_PORT"; exit 1; }
          test -n "${{ secrets.SERVER_KNOWN_HOSTS }}" || { echo "Missing SERVER_KNOWN_HOSTS"; exit 1; }

      - name: Deploy to production server
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          known_hosts: ${{ secrets.SERVER_KNOWN_HOSTS }}
          script: |
            set -e
            cd /home/zaddi-zk/OTP-Bot-Telegram
            chmod +x ./deploy.sh
            ./deploy.sh main
