name: Deploy OTP-Bot-Telegram

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        run: |
          echo "Checking deployment secrets..."
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "❌ ERROR: GitHub secret SERVER_HOST is not configured"
            echo "Please add deployment secrets to: Settings → Secrets and variables → Actions"
            exit 1
          fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "❌ ERROR: GitHub secret SERVER_USER is not configured"; exit 1
          fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "❌ ERROR: GitHub secret SERVER_SSH_KEY is not configured"; exit 1
          fi
          if [ -z "${{ secrets.SERVER_SSH_PORT }}" ]; then
            echo "❌ ERROR: GitHub secret SERVER_SSH_PORT is not configured"; exit 1
          fi
          if [ -z "${{ secrets.SERVER_KNOWN_HOSTS }}" ]; then
            echo "❌ ERROR: GitHub secret SERVER_KNOWN_HOSTS is not configured"; exit 1
          fi
          echo "✓ All required secrets are configured"

      - name: Deploy to production server
        if: success()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          known_hosts: ${{ secrets.SERVER_KNOWN_HOSTS }}
          script: |
            set -e
            cd /home/zaddi-zk/OTP-Bot-Telegram
            chmod +x ./deploy.sh
            ./deploy.sh main
