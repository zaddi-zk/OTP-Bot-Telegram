name: Deploy OTP-Bot-Telegram

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate deployment secrets
        id: validate
        run: |
          echo "Checking deployment secrets..."
          missing=0
          if [ -z "${{ secrets.SERVER_HOST }}" ]; then
            echo "⚠️ Missing SERVER_HOST"
            missing=1
          fi
          if [ -z "${{ secrets.SERVER_USER }}" ]; then
            echo "⚠️ Missing SERVER_USER"
            missing=1
          fi
          if [ -z "${{ secrets.SERVER_SSH_KEY }}" ]; then
            echo "⚠️ Missing SERVER_SSH_KEY"
            missing=1
          fi
          if [ -z "${{ secrets.SERVER_SSH_PORT }}" ]; then
            echo "⚠️ Missing SERVER_SSH_PORT"
            missing=1
          fi
          if [ -z "${{ secrets.SERVER_KNOWN_HOSTS }}" ]; then
            echo "⚠️ Missing SERVER_KNOWN_HOSTS"
            missing=1
          fi
          if [ "$missing" -eq 1 ]; then
            echo "::warning::Deployment secrets missing — skipping SSH deploy step."
            echo "deploy=false" >> $GITHUB_OUTPUT
          else
            echo "✅ All required secrets are configured"
            echo "deploy=true" >> $GITHUB_OUTPUT
          fi

      - name: Deploy to production server
        if: steps.validate.outputs.deploy == 'true'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_SSH_PORT }}
          known_hosts: ${{ secrets.SERVER_KNOWN_HOSTS }}
          script: |
            set -e
            cd /home/zaddi-zk/OTP-Bot-Telegram
            chmod +x ./deploy.sh
            ./deploy.sh main
