[build]
# Install dependencies and verify syntax
command = "python -m pip install --upgrade pip && python -m pip install -r requirements.txt && python -m py_compile main.py bot.py && echo '✅ Build complete'"

[start]
# Use uvicorn to start the FastAPI app
# This will bind the app to PORT and trigger all FastAPI startup events
command = "uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1"

# Restart policy
restartPolicyMaxRetries = 5
restartPolicyDelayMs = 10000
